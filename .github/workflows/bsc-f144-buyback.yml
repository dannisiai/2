name: BSC F144 Buyback

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

jobs:
  buyback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BUYBACK_VAULT_ADDRESS: "0x7563CaD223b6cCfFe34A2649FeFf794A1B86D54F"
      BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Execute buyback once
        run: python scripts/execute_buyback_once.py
